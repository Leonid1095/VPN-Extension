name: 🐛 Bug report
description: Что-то работает не так, как описано
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Спасибо, что нашёл время сообщить. Чем больше деталей — тем быстрее починим.
  - type: input
    id: version
    attributes:
      label: Версия PLGames Connect
      placeholder: e.g. 2.2.0
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Браузер
      options:
        - Chrome
        - Edge
        - Brave
        - Yandex
        - Opera
        - Other (укажи в описании)
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      placeholder: |
        1. Открыть попап
        2. Нажать «+ Свой сервер»
        3. Вставить https://...
        4. Увидеть ошибку
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Что произошло
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Логи / скриншоты
      description: |
        chrome://extensions/ → «Подробности» расширения → «Просмотр представления:
        служебный воркер» → вкладка Console. Скопируй ошибки сюда.
      render: shell
  - type: checkboxes
    id: privacy
    attributes:
      label: Чек
      options:
        - label: Я не приложил пароли, токены и реальные адреса своих серверов.
          required: true
